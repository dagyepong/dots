# ==================================================
#           CYBERPUNK NEON EDITION
# ==================================================
# Border: Magenta → Cyan gradient (45°)
# Glow:  Magenta-tinted soft shadow
# Blur, rounded corners, smooth animations
# ==================================================
# (Gaps kept original: in=3, out=5)
# ==================================================

debug:disable_logs = false

################
### MONITORS ###
################
monitor=eDP-1,1920x1080@240,0x0,1
monitor=,preferred,auto,1,mirror,DP-1

#####################################
#           Init Scripts            #
#####################################
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = ckb-next -b
exec-once = hyprctl setcursor Bibata-Modern-Classic 24
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = sleep 3 && /usr/lib/kdeconnectd
exec-once = hash dbus-update-activation-environment 2>/dev/null &
exec-once = xdg-desktop-portal-hyprland &
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hyprctl setcursor Bibata-Modern-Classic 24
exec-once = ~/.config/hypr/xdg-portal-hyprland
exec-once = hyprsunset
exec-once = swayidle -w timeout 300 'hyprlock' before-sleep 'hyprlock'
exec-once = hyprpm reload -n

#####################################
#       Environment Variables       #
#####################################
env = XDG_CURRENT_DESKTOP,Hyprland 
env = XDG_SESSION_TYPE,wayland
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = XDG_SESSION_DESKTOP,Hyprland 
env = GDK_BACKEND=wayland
env = WAYLAND_DISPLAY=wayland-0
env = QT_QPA_PLATFORM,wayland
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt6ct
env = MOZ_ENABLE_WAYLAND,1
env = STEAM_RUNTIME_PREFER_HOST_LIBRARIES,1
env = STEAM_RUNTIME,1
env = PROTON_ENABLE_WAYLAND,1
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

#####################################
#        Input Configuration        #
#####################################
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 2
    float_switch_override_focus = 2

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0
    # cursor timeout removed for compatibility
}

# ========== CYBERPUNK EYECANDY ==========
general {
    gaps_in = 3
    gaps_out = 5
    border_size = 3
    # Neon gradient: Magenta -> Cyan
    col.active_border = rgba(ff00ffee) rgba(00ffffaa) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    active_opacity = 0.95
    inactive_opacity = 0.85
    fullscreen_opacity = 1.0

    rounding = 12
    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
        xray = true
        ignore_opacity = false
    }

    dim_inactive = true
    dim_strength = 0.3

    # Cyberpunk glow (magenta)
    shadow {
        enabled = true
        range = 20
        render_power = 2
        color = rgba(ff00ffaa)
        # offset = "0 0"   # uncomment for centered glow
    }
}

blurls = waybar

# ========== ANIMATIONS ==========
animations {
    enabled = yes
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutBack, 0.34, 1.56, 0.64, 1
    bezier = gentleBounce, 0.175, 0.885, 0.32, 1.275

    animation = windows, 1, 6, easeOutQuint, popin 80%
    animation = windowsIn, 1, 6, easeOutQuint, popin 80%
    animation = windowsOut, 1, 4, easeOutQuint, popin 80%
    animation = windowsMove, 1, 5, easeOutQuint
    animation = border, 1, 8, default
    animation = fade, 1, 5, easeOutCirc
    animation = workspaces, 1, 5, gentleBounce, slidevert
    animation = specialWorkspace, 1, 5, easeOutQuint, slidefade
}

dwindle {
    force_split = 0
    special_scale_factor = 0.8
    split_width_multiplier = 1.0
    use_active_for_splits = true
    pseudotile = yes
    preserve_split = yes
}

master {
    special_scale_factor = 0.8
}

misc {
    disable_hyprland_logo = true
    disable_watchdog_warning = true
    always_follow_on_dnd = true
    layers_hog_keyboard_focus = true
    animate_manual_resizes = false
    enable_swallow = true
    swallow_regex =
    focus_on_activate = true
    vfr = 1
    background_color = 0x1e1e2e
}

gestures {
    workspace_swipe_distance = 250
    workspace_swipe_invert = true
    workspace_swipe_min_speed_to_force = 15
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new = false
}

# ========== KEYBINDS (unchanged) ==========
$mainMod = SUPER

bind = $mainMod, RETURN, exec, ghostty
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, M, exit,
bind = $mainMod, V, togglefloating,
bind = CTRL, SPACE, exec, rofi -show drun 
bind = $mainMod, F, fullscreen
bind = $mainMod, Y, pin
bind = $mainMod, A, exec, ~/.config/hypr/scripts/screenshot.sh
bind = $mainMod, K, togglegroup,
bind = $mainMod, Tab, changegroupactive, f
bind = $mainMod SHIFT, G, exec, hyprctl --batch "keyword general:gaps_out 5;keyword general:gaps_in 3"
bind = $mainMod , G, exec, hyprctl --batch "keyword general:gaps_out 0;keyword general:gaps_in 0"
bind = $mainMod SHIFT, R, exec, hyprctl reload

# Volume & media
bind=,XF86AudioLowerVolume,exec,pamixer -d 3 && pamixer --get-volume > /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob
bind=,XF86AudioRaiseVolume,exec,pamixer -i 3 && pamixer --get-volume > /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob
bind=,XF86AudioMute,exec,pamixer --toggle-mute && (pamixer --get-volume || echo 0) > /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob
bind=,XF86AudioMute,exec,amixer sset Master toggle | sed -En '/\[on\]/ s/.*\[([0-9]+)%\].*/\1/ p; /\[off\]/ s/.*/0/p' | head -1 > /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob
bind=,XF86AudioPlay,exec, playerctl play-pause
bind=,XF86AudioNext,exec, playerctl next
bind=,XF86AudioPrev,exec, playerctl previous

bind = CTRL, E, exec, emacsclient -c
bind = $mainMod, O, exec, killall --signal SIGUSR2 waybar
bind = $mainMod, D, exec, killall --signal SIGUSR2 nwg-dock-hyprland
bind = $mainMod, L, exec, hyprlock 

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, period, workspace, e+1
bind = $mainMod, comma, workspace, e-1
bind = $mainMod, minus, movetoworkspace, special
bind = $mainMod, equal, togglespecialworkspace

# Move windows
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Move to workspace (silent)
bind = $mainMod CTRL, 1, movetoworkspace, 1
bind = $mainMod CTRL, 2, movetoworkspace, 2
bind = $mainMod CTRL, 3, movetoworkspace, 3
bind = $mainMod CTRL, 4, movetoworkspace, 4
bind = $mainMod CTRL, 5, movetoworkspace, 5
bind = $mainMod CTRL, 6, movetoworkspace, 6
bind = $mainMod CTRL, 7, movetoworkspace, 7
bind = $mainMod CTRL, 8, movetoworkspace, 8
bind = $mainMod CTRL, 9, movetoworkspace, 9
bind = $mainMod CTRL, 0, movetoworkspace, 10
bind = $mainMod CTRL, left, movetoworkspace, -1
bind = $mainMod CTRL, right, movetoworkspace, +1

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

binds {
     workspace_back_and_forth = 1
     allow_workspace_cycles = 1
}
bind = $mainMod,slash,workspace,previous

# Resize submaps
bind = $mainMod,R,submap,resize
submap = resize
binde =,right,resizeactive,15 0
binde =,left,resizeactive,-15 0
binde =,up,resizeactive,0 -15
binde =,down,resizeactive,0 15
binde =,l,resizeactive,15 0
binde =,h,resizeactive,-15 0
binde =,k,resizeactive,0 -15
binde =,j,resizeactive,0 15
bind =,escape,submap,reset
submap = reset

bind=CTRL SHIFT, left, resizeactive,-15 0
bind=CTRL SHIFT, right, resizeactive,15 0
bind=CTRL SHIFT, up, resizeactive,0 -15
bind=CTRL SHIFT, down, resizeactive,0 15
bind=CTRL SHIFT, l, resizeactive, 15 0
bind=CTRL SHIFT, h, resizeactive,-15 0
bind=CTRL SHIFT, k, resizeactive, 0 -15
bind=CTRL SHIFT, j, resizeactive, 0 15

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ========== AUTOSTART APPS ==========
exec-once = qs -p ~/.config/quickshell/shell.qml &
exec-once = /usr/libexec/polkit-gnome-authentication-agent-1 &
exec-once = swaybg -i /home/nana/Pictures/wallpaper/dopesmoker_gruvbox.png &
exec-once = mako &
exec-once = gentoo-pipewire-launcher &
exec-once = zsh -c "mkfifo /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob && tail -f /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob | wob & disown" &
exec-once = nm-applet --indicator &
exec-once = flatpak run com.valvesoftware.Steam -silent -nofriendsui -nochatui
exec-once = nwg-dock-hyprland -l top
exec-once = hyprctl setcursor Bibata-Modern-Classic 24

# ========== XWAYLAND ==========
xwayland {
    create_abstract_socket = true
}

# ========== WINDOW RULES ==========
windowrulev = workspace:1, class:^(qutebrowser)$
windowrulev = workspace:4, class:^(emacs)$
windowrulev = workspace:5, class:^(gamehub)$
exec-once = [workspace 2 silent] alacritty
exec-once = [workspace 3 silent] alacritty
exec-once = [workspace 4 silent] emacs
exec-once = [workspace 5 silent] com.github.tkashkin.gamehub

# Float necessary windows
windowrule = match:class = ^(Rofi)$, float 1
windowrule = match:class = ^(pavucontrol-qt)$, float 1
windowrule = match:class = ^(blueman-manager)$, float 1
windowrule = match:class = ^(pcmanfm-qt)$, float 1
windowrule = match:class = ^(Discord)$, float 1
windowrule = match:title = ^(Picture in picture)$, float 1
windowrule = match:class = ^(com.github.tkashkin.gamehub)$, float 1
windowrule = match:class = ^(xdg-desktop-portal-hyprland)$, float 1
windowrule = match:class = ^(org.kde.polkit-kde-authentication-agent-1)$, float 1
windowrule = match:title = ^(Steam - Self Updater)$, float 1
windowrule = match:class = ^(steam)$, float 1

# Opacity overrides
windowrule= match:class = ^(librewolf)$, opacity 0.90
windowrule= match:class = ^(nwg-dock-hyprland)$, opacity 0.85
windowrule= match:class = ^(ghostty)$, opacity 0.92
windowrule= match:class = ^(pcmanfm-qt)$, opacity 0.85
windowrule= match:class = ^(org.prismlauncher.PrismLauncher)$, opacity 0.85
windowrule= match:class = ^(discord)$, opacity 0.86
windowrule= match:class = ^(com.github.tkashkin.gamehub)$, opacity 0.90

# Picture-in-Picture
windowrule= match:title = ^(Picture-in-Picture)$, float 1
windowrule= match:title = ^(Picture-in-Picture)$, size 960 540
windowrule= match:title = ^(Picture-in-Picture)$, move 25%-
windowrule= match:class = ^(org.prismlauncher.PrismLauncher)$, float 1
windowrule= match:class = ^(mpv)$, move 25%-
windowrule= match:class = ^(mpv)$, size 960 540
windowrule= match:class = ^(ghostty)$, animation slide left

# Ghostty scratchpad
windowrule = float 1, match:class = ^(ghostty-scratchpad)$
windowrule = size 75% 60%, match:class = ^(ghostty-scratchpad)$
windowrule = move 50% 50%, match:class = ^(ghostty-scratchpad)$
bind = $mainMod, T, exec, [workspace special:ghostty-scratchpad] ghostty --class="ghostty-scratchpad"
bind = $mainMod SHIFT, T, togglespecialworkspace, ghostty-scratchpad
