# ==================================================
#      HYPRLOCK - CYBERPUNK GLITCH EDITION
# ==================================================
# Fixed: profile picture rotation (rotate = 180)
# Repositioned to avoid overlapping password field
# ==================================================

background {
    monitor =
    path = ~/.config/assets/backgrounds/gWMJAWI - Imgur.png
    blur_passes = 3
    blur_size = 10
    contrast = 1.2
    brightness = 0.65
    vibrancy = 0.35
    vibrancy_darkness = 0.4
}

general {
    no_fade_in = false
    no_fade_out = false
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
}

# ---------- INPUT FIELD (moved slightly down to avoid clash) ----------
input-field {
    monitor =
    size = 320, 70
    outline_thickness = 4
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true
    outer_color = rgba(0, 255, 255, 0.85)
    inner_color = rgba(0, 10, 20, 0.85)
    font_color = rgba(0, 255, 255, 1.0)
    fade_on_empty = false
    rounding = 16
    check_color = rgba(255, 0, 255, 0.9)
    placeholder_text = <span foreground="#0ff">⚡ ENTER PASSWORD ⚡</span>
    hide_input = false
    position = 0, -240                     # Moved from -200 to -240 (further down)
    halign = center
    valign = center
}

# ---------- DATE (primary neon) ----------
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(0, 255, 255, 0.9)
    font_size = 22
    font_family = JetBrains Mono
    position = 0, 320
    halign = center
    valign = center
}

# ---------- TIME (main layer, secondary neon) ----------
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M")"
    color = rgba(255, 0, 255, 0.95)
    font_size = 120
    font_family = JetBrains Mono ExtraBold
    position = 0, 220
    halign = center
    valign = center
}

# ========== GLITCH EFFECT: Two offset time layers ==========
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M")"
    color = rgba(0, 255, 255, 0.4)
    font_size = 120
    font_family = JetBrains Mono ExtraBold
    position = -6, 216
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M")"
    color = rgba(255, 0, 255, 0.4)
    font_size = 120
    font_family = JetBrains Mono ExtraBold
    position = 6, 224
    halign = center
    valign = center
}

# ---------- PROFILE PICTURE (fixed rotation, moved up, larger) ----------
image {
    monitor =
    path = /home/nana/Downloads/IMG_0038.JPG   # ← Your image path
    size = 160
    border_size = 4
    border_color = rgba(0, 255, 255, 0.9)
    rounding = 80
    rotate = -90                             # ← Fixed: rotated 180° to correct orientation
    position = 0, -50                        # ← Moved up (was -120) to avoid overlap
    halign = center
    valign = center
}

# ---------- DESKTOP ICON (optional) ----------
image {
    monitor =
    path = ~/.config/hypr/hyprland.png
    size = 80
    border_size = 3
    border_color = rgba(255, 0, 255, 0.8)
    rounding = 12
    rotate = 0
    position = -50, 50
    halign = right
    valign = bottom
}

# ---------- CYBERPUNK TAGLINE ----------
label {
    monitor =
    text = "▰▰▰ GLITCH MODE ▰▰▰"
    color = rgba(0, 255, 255, 0.7)
    font_size = 14
    font_family = JetBrains Mono
    position = 0, -380
    halign = center
    valign = center
}
