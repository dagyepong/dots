# ==================================================
#           HYPRLOCK - MIDNIGHT GALAXY
# ==================================================
# Cosmic deep blue to violet aesthetic
# Matching your Hyprland "Midnight Galaxy" theme
# ==================================================

# BACKGROUND (blurred screenshot for consistency)
background {
    monitor =
    path = ~/.config/assets/backgrounds/gWMJAWI - Imgur.png  # Keep your wallpaper
    blur_passes = 2        # Add subtle blur (like your Hyprland blur)
    blur_size = 8          # Match your decoration.blur.size
    contrast = 1.1         # Slightly enhance contrast
    brightness = 0.7
    vibrancy = 0.25
    vibrancy_darkness = 0.3
}

# GENERAL BEHAVIOR
general {
    no_fade_in = false     # Let it fade in smoothly
    no_fade_out = false
    hide_cursor = true     # Hide cursor while locked
    grace = 0
    disable_loading_bar = true
}

# INPUT FIELD (with galaxy glow)
input-field {
    monitor =
    size = 300, 65
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true
    outer_color = rgba(100, 108, 255, 0.6)    # Deep blue outer glow
    inner_color = rgba(20, 20, 40, 0.85)      # Dark cosmic background
    font_color = rgba(200, 180, 255, 0.95)    # Soft violet text
    fade_on_empty = false
    rounding = 12                              # Rounded corners to match Hyprland
    check_color = rgba(100, 108, 255, 1.0)    # Matching blue checkmark
    placeholder_text = <span foreground="#a0a0ff">🔒 Enter Password...</span>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}

# DATE (subtle cosmic)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(180, 190, 255, 0.85)
    font_size = 22
    font_family = JetBrains Mono
    position = 0, 320
    halign = center
    valign = center
}

# TIME (bold galactic)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M")"
    color = rgba(200, 180, 255, 0.95)
    font_size = 105
    font_family = JetBrains Mono ExtraBold
    position = 0, 220
    halign = center
    valign = center
}

# PROFILE PICTURE (optional – add your own image)
image {
    monitor =
    path = ~/.face.icon                     # Replace with your profile pic path
    size = 110
    border_size = 3
    border_color = rgba(100, 108, 255, 0.9) # Galaxy blue border
    rounding = 55                           # Circular crop (if image is square)
    position = 0, -100
    halign = center
    valign = center
}

# DESKTOP ENVIRONMENT ICON (optional – e.g., Hyprland logo)
image {
    monitor =
    path = ~/.config/hypr/hyprland.png      # Replace with your own icon
    size = 75
    border_size = 2
    border_color = rgba(150, 130, 255, 0.7)
    rounding = 10
    position = -50, 50
    halign = right
    valign = bottom
}
