# ==================================================
#      HYPRLOCK - CYBERPUNK GLITCH EDITION
#         WITH COMPLETE ANIMATIONS
# ==================================================

background {
    monitor =
    path = ~/.config/assets/backgrounds/gWMJAWI - Imgur.png
    blur_passes = 3
    blur_size = 10
    contrast = 1.2
    brightness = 0.65
    vibrancy = 0.35
    vibrancy_darkness = 0.4
}

general {
    hide_cursor = true
    # Optional: add 'grace = 2' to allow unlocking with mouse movement for 2 seconds
}

# ---------- ANIMATIONS (All available options) ----------
bezier = myBounce, 0.34, 1.56, 0.64, 1   # For a bounce effect

animations {
    enabled = true

    # Slower, more noticeable fades
    animation = fadeIn, 1, 12, default
    animation = fadeOut, 1, 12, default

    # Bouncy input field width (very obvious)
    animation = inputFieldWidth, 1, 8, myBounce

    # Smoother dots animation
    animation = inputFieldDots, 1, 6, default

    # Color transitions on success/error
    animation = inputFieldColors, 1, 4, default
}

# ---------- INPUT FIELD ----------
input-field {
    monitor =
    size = 320, 70
    outline_thickness = 4
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true
    outer_color = rgba(0, 255, 255, 0.85)
    inner_color = rgba(0, 10, 20, 0.85)
    font_color = rgba(0, 255, 255, 1.0)
    fade_on_empty = false
    rounding = 16
    check_color = rgba(255, 0, 255, 0.9)
    placeholder_text = <span foreground="#0ff">⚡ ENTER PASSWORD ⚡</span>
    hide_input = false
    position = 0, -240
    halign = center
    valign = center
}

# ---------- DATE (primary neon) ----------
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(0, 255, 255, 0.9)
    font_size = 22
    font_family = JetBrains Mono
    position = 0, 320
    halign = center
    valign = center
}

# ---------- TIME (main layer, secondary neon) ----------
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M")"
    color = rgba(255, 0, 255, 0.95)
    font_size = 120
    font_family = JetBrains Mono ExtraBold
    position = 0, 220
    halign = center
    valign = center
}

