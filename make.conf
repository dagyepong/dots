─────┬────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
     │ File: /etc/portage/make.conf
─────┼────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────

COMMON_FLAGS="-march=native -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"



# Parallel builds (8 cores / 16 threads)
MAKEOPTS="-j16 -l16"
EMERGE_DEFAULT_OPTS="--jobs=8 --load-average=8"
PORTAGE_SCHEDULING_POLICY="idle"
# Hardened features
FEATURES="splitdebug strict-compiler strict-paths protect-owned binpkg-requester assume-digests"
PORTAGE_ELOG_CLASSES="warn error log"
PORTAGE_ELOG_SYSTEM="save_summary:log"

FEATURES="ipc-sandbox candy parallel-fetch parallel-install sign network-sandbox"
VIDEO_CARDS="amdgpu radeonsi nvidia"
INPUT_DEVICES="libinput synaptics"
USE="dist-kernel X spice xorg spice usbredir gtk dbus ABI_X86=(64 32) png udisks udev alsa elogind policykit colord jpeg pavucontrol wifi wayland gles2 opengl networkmanager pulseaudio"



# Language support
LINGUAS="en"
LC_MESSAGES="C"

# Networking and mirrors
GENTOO_MIRRORS="https://distfiles.gentoo.org"
SYNC="rsync://rsync.gentoo.org/gentoo-portage"

# License and keywords
ACCEPT_LICENSE="*"
ACCEPT_KEYWORDS="~amd64"

# Appending getbinpkg to the list of values within the FEATURES variable
FEATURES="${FEATURES} getbinpkg"
# Require signatures
FEATURES="${FEATURES} binpkg-request-signature"