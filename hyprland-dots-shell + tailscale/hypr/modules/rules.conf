### WINDOW RULES ###

# Zoom menu window
windowrule = match:class zoom, match:title (menu window), stay_focused on

# Suppress maximize event for all windows
windowrule = match:class .*, suppress_event = maximize

# Prevent focus on empty, floating, non-fullscreen, non-pinned XWayland windows
windowrule = match:class ^$, match:title ^$, no_focus on

# (slurp window rules removed — slurp runs as a wlr_layer_shell surface,
# not a toplevel, so windowrule matchers never matched. The overlay is
# managed by slurp itself.)


# Picture-in-Picture: float, pin to all workspaces, don't steal focus,
# default 16:9 480x270, no blur. Position left to Firefox / the user
# (the move rule was overridden anyway).
windowrule = match:title ^(Picture-in-Picture|PiP)$, float on
windowrule = match:title ^(Picture-in-Picture|PiP)$, pin on
windowrule = match:title ^(Picture-in-Picture|PiP)$, no_initial_focus on
windowrule = match:title ^(Picture-in-Picture|PiP)$, size 480 270
windowrule = match:title ^(Picture-in-Picture|PiP)$, no_blur on

# XWayland video bridge
windowrule = match:class ^(xwaylandvideobridge)$, opacity 0.0 override
windowrule = match:class ^(xwaylandvideobridge)$, no_anim on
windowrule = match:class ^(xwaylandvideobridge)$, no_initial_focus on
windowrule = match:class ^(xwaylandvideobridge)$, max_size 1 1
windowrule = match:class ^(xwaylandvideobridge)$, no_blur on
windowrule = match:class ^(xwaylandvideobridge)$, no_focus on

# GNOME Calendar
windowrule = match:title ^(Calendar)$, float on
windowrule = match:title ^(Calendar)$, pin on
windowrule = match:title ^(Calendar)$, size 400 400
windowrule = match:title ^(Calendar)$, move 39% 12%

# GNOME apps
windowrule = match:class ^(org\.gnome\.), rounding 12
windowrule = match:class ^(org\.gnome\.), decorate off

# Force tiled
windowrule = match:class ^(gnome-control-center)$, tile on
windowrule = match:class ^(nm-connection-editor)$, tile on

# Force floating
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(xdg-desktop-portal)$, float on
windowrule = match:class ^(xdg-desktop-portal)$, center 1
windowrule = match:class ^(zoom)$, float on

# Decorations
windowrule = match:class ^(zen)$, decorate off

# Steam games (Proton-wrapped) — force fullscreen so they don't open
# small / windowed when the game itself doesn't apply its mode.
windowrule = match:class ^(steam_app_.*)$, fullscreen on

# Gaming: lower input lag inside fullscreen apps. `immediate on` requires
# general:allow_tearing = true (set in general.conf); tearing only happens
# inside fullscreen apps, the desktop stays vsynced.
# (Hyprland 0.55.1 doesn't accept `idleinhibit` as a window rule — Wayland
# fullscreen apps that need to prevent sleep should request the
# org.freedesktop.ScreenSaver inhibit themselves, as media-inhibit.sh does
# for media playback.)
windowrule = match:fullscreen 1, immediate on
