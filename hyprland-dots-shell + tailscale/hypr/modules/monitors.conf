### MONITORS ###
# Use preferred settings for built-in display, and auto-detect for others
monitor = eDP-1, preferred, 0x0, 1
monitor = , preferred, auto, 1
#monitor = DP-4, preferred, auto, 1, transform, 1

# Laptop lid switch handler.
# Use DPMS (panel power off/on) instead of "monitor disable", which tears down the
# output and leaves the i915 atomic page-flip wedged ("Device or resource busy"),
# producing an unrecoverable black screen on lid open. DPMS keeps the output
# configured; the open handler toggles off->on to force a fresh modeset and clear
# any stuck flip. Targets eDP-1 only so a docked external monitor is unaffected.
bindl = , switch:on:Lid Switch, exec, hyprctl dispatch dpms off eDP-1
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on eDP-1 && sleep 0.2 && hyprctl dispatch dpms off eDP-1 && hyprctl dispatch dpms on eDP-1 && brightnessctl -r

### WORKSPACE ASSIGNMENTS ###
workspace = 1, monitor:eDP-1, default:true
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:DP-4
workspace = 7, monitor:DP-4
workspace = 8, monitor:DP-4
workspace = 9, monitor:DP-4
workspace = 10, monitor:DP-4
