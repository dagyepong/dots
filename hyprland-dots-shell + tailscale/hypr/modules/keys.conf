### KEYBINDINGS ###

# Application launchers and system actions
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, L, exec, $lockscreen
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, G, togglefloating,
bind = $mainMod, R, global, quickshell:spotlight
bind = ALT, space, global, quickshell:spotlight
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, N, global, quickshell:notifications
bind = $mainMod, V, global, quickshell:clipboard
bind = $mainMod, C, exec, $colorpicker
bind = $mainMod, F, fullscreenstate, 1   # moved off Super+Shift+UP (clashed with resizeactive at line 126)
bind = $mainMod SHIFT, N, exec, $externalscript2
bind = $mainMod SHIFT, S, global, quickshell:screenshot-region
bind = $mainMod CTRL SHIFT, S, exec, $screenshotocr
# Super+Shift+A (edit-on-the-fly via slurp|swappy) removed — click the
# Screenshot notification's thumbnail to open the saved image in swappy.
bind = $mainMod CTRL, R, exec, bash ~/.config/scripts/wayvnc-toggle.sh
bind = $mainMod, B, exec, $externalscript1
bind = $mainMod SHIFT, E, global, quickshell:powermenu
bind = $mainMod, F1, global, quickshell:keybinds
bind = $mainMod, M, global, quickshell:sysmon
bind = $mainMod, A, global, quickshell:quickactions
bind = $mainMod, S, global, quickshell:audiopower
bind = $mainMod, D, global, quickshell:calendar
bind = $mainMod, W, global, quickshell:wallpaper

# Utility
bind = $mainMod SHIFT, R, exec, bash ~/.config/scripts/screenrecord.sh
bind = $mainMod SHIFT, M, exec, bash -c 'mpv --no-video --shuffle ~/Music/*'
bind = $mainMod SHIFT, K, exec, pkill mpv
bind = $mainMod SHIFT, B, global, quickshell:bluetooth

# Focus movement
bind = $mainMod CTRL, left, movefocus, l
bind = $mainMod CTRL, right, movefocus, r
bind = $mainMod CTRL, down, movefocus, d
bind = $mainMod CTRL, up, movefocus, u
bind = $mainMod, left, movewindow, l
bind = $mainMod, right, movewindow, r
bind = $mainMod, up, movewindow, u
bind = $mainMod, down, movewindow, d

# Workspace switching
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Multi-monitor workspace navigation
bind = $mainMod, bracketleft, workspace, m-1       # Previous workspace on current monitor
bind = $mainMod, bracketright, workspace, m+1      # Next workspace on current monitor

# Alt+Tab keeps muscle memory via native cyclenext (no overlay).
bind = ALT, Tab, exec, hyprctl dispatch cyclenext
bind = ALT SHIFT, Tab, exec, hyprctl dispatch cyclenext prev

# Super+Tab opens the workspace overview and cycles on each press.
# bindi = Super, Super_L tracks Super press/release so the overlay commits
# the highlighted workspace when Super is finally released.
bind  = SUPER, Tab,       global, quickshell:overview-cycle
bind  = SUPER SHIFT, Tab, global, quickshell:overview-cycle-prev
bindi = Super, Super_L,   global, quickshell:supertap
bind = $mainMod, grave, focusmonitor, +1           # Focus next monitor

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move window to adjacent workspace on current monitor
bind = $mainMod SHIFT, bracketleft, movetoworkspace, m-1
bind = $mainMod SHIFT, bracketright, movetoworkspace, m+1

# Move window to next monitor
bind = $mainMod SHIFT, grave, movecurrentworkspacetomonitor, +1

# Mouse bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Mouse workspace cycling (monitor-aware)
bind = $mainMod, mouse_down, workspace, m+1
bind = $mainMod, mouse_up, workspace, m-1
bind = $mainMod CTRL, mouse_down, workspace, e+1
bind = $mainMod CTRL, mouse_up, workspace, e-1

# Media and hardware keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-
bindel = , XF86KbdBrightnessUp, exec, brightnessctl -d dell::kbd_backlight s +1
bindel = , XF86KbdBrightnessDown, exec, brightnessctl -d dell::kbd_backlight s 1-
bindel = , XF86KbdLightOnOff, exec, brightnessctl -d dell::kbd_backlight s +1
bindel = $mainMod CTRL, K, exec, sh -c 'cur=$(brightnessctl -d dell::kbd_backlight g); max=$(brightnessctl -d dell::kbd_backlight m); next=$(( cur + 1 > max ? 0 : cur + 1 )); brightnessctl -d dell::kbd_backlight s "$next"'

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindel = , XF86PowerOff, exec, systemctl suspend

# Window resizing
bind = $mainMod, KP_Add, resizeactive, 20 20
binde = $mainMod SHIFT, right, resizeactive, 20 0
binde = $mainMod SHIFT, down, resizeactive, 0 20
bind = $mainMod, KP_Subtract, resizeactive, -20 -20
binde = $mainMod SHIFT, left, resizeactive, -20 0
binde = $mainMod SHIFT, up, resizeactive, 0 -20
