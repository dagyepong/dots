# BACKGROUND
background {
    monitor =
    path = ~/.config/hypr/lockbg
    blur_passes = 2
    contrast = 0.89
    brightness = 0.82
    vibrancy = 0.17
}

general {
    hide_cursor = false
    grace = 0
}

# ── CLOCK ─────────────────────────────── bottom left

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(245, 245, 244, 0.92)
    font_size = 96
    font_family = FiraCode Nerd Font Bold
    position = 60, 120
    halign = left
    valign = bottom
    shadow_passes = 2
    shadow_size = 4
}

label {
    monitor =
    text = cmd[update:1000] date +"%A, %d %B" | tr '[:lower:]' '[:upper:]'
    color = rgba(120, 113, 108, 0.70)
    font_size = 13
    font_family = FiraCode Nerd Font
    position = 66, 82
    halign = left
    valign = bottom
}

# ── AUTH ──────────────────────────────── center

image {
    monitor =
    path = ~/.config/hypr/avatar.png
    border_size = 2
    border_color = rgba(51, 204, 255, 0.8)
    size = 80
    rounding = -1
    position = 0, 90
    halign = center
    valign = center
}

label {
    monitor =
    text =  $USER
    color = rgba(245, 245, 244, 0.70)
    font_size = 14
    font_family = FiraCode Nerd Font
    position = 0, 20
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(51, 204, 255, 0.0)
    inner_color = rgba(28, 25, 23, 0.55)
    font_color = rgba(245, 245, 244, 1.0)
    fade_on_empty = false
    font_family = FiraCode Nerd Font
    placeholder_text = <i><span foreground="##78716c"> enter password</span></i>
    check_color = rgba(51, 204, 255, 1.0)
    fail_color = rgba(239, 68, 68, 1.0)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    capslock_color = rgba(234, 179, 8, 1.0)
    hide_input = false
    position = 0, -50
    halign = center
    valign = center
}

# ── MEDIA ─────────────────────────────── bottom right

image {
    monitor =
    path = /tmp/hyprlock-art.jpg
    size = 80
    rounding = 8
    border_size = 1
    border_color = rgba(68, 64, 60, 0.5)
    position = -40, 140
    halign = right
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] playerctl metadata title 2>/dev/null | awk '{if(length>28) print substr($0,1,28)"…"; else print}'
    color = rgba(245, 245, 244, 0.85)
    font_size = 12
    font_family = FiraCode Nerd Font Bold
    position = -40, 108
    halign = right
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] playerctl metadata artist 2>/dev/null | awk '{if(length>24) print substr($0,1,24)"…"; else print}'
    color = rgba(120, 113, 108, 0.80)
    font_size = 11
    font_family = FiraCode Nerd Font
    position = -40, 90
    halign = right
    valign = bottom
}

# ── POWER ─────────────────────────────── bottom center

label {
    monitor =
    text =   󰤄  
    color = rgba(245, 245, 244, 0.45)
    font_size = 26
    onclick = systemctl suspend
    position = -80, 40
    halign = center
    valign = bottom
}

label {
    monitor =
    text =   󰜉  
    color = rgba(245, 245, 244, 0.45)
    font_size = 26
    onclick = reboot now
    position = 0, 40
    halign = center
    valign = bottom
}

label {
    monitor =
    text =   󰐥  
    color = rgba(239, 68, 68, 0.60)
    font_size = 26
    onclick = shutdown now
    position = 80, 40
    halign = center
    valign = bottom
}
