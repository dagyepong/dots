# Qt6 theme provider for Hyprland (hyprqt6engine), read at Qt app startup.
# Without this, Qt apps and Quickshell (e.g. the Spotlight launcher's app
# icons) fall back to the "hicolor" theme, which ships no application icons,
# so icons render blank. Docs: https://wiki.hypr.land/Hypr-Ecosystem/hyprqt6engine/
theme {
    icon_theme = Papirus-Dark
}
