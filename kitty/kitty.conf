# ==============================================================================
# WAYLAND / WINDOW SETTINGS
# ==============================================================================
wayland_titlebar_color          background
remember_window_size            no
initial_width                   940
initial_height                  520
window_padding_width            12
placement_strategy              center
hide_window_decorations         yes

# Smooth window behaviors
confirm_os_window_close         0
default_layout                  tall

# Subtle background blur
dynamic_background_opacity      yes
background_opacity              0.85
background_blur                 20

# ==============================================================================
# FONTS & RENDERING
# ==============================================================================
font_family                     Iosevka Nerd Font
bold_font                       auto
italic_font                     auto
bold_italic_font                auto
font_size                       10

text_composition_strategy       platform
url_style                       curly
url_color                       #785cea
detect_urls                     yes

symbol_map U+4E00-U+9FFF Zen Kaku Gothic New

# ==============================================================================
# CURSOR & MOUSE
# ==============================================================================
# Using your Active Pink
cursor                          #ff71ce
cursor_text_color               #1a1a2e
cursor_shape                    beam
cursor_blink_interval           0.6
cursor_stop_blinking_after      15.0
mouse_hide_wait                 3.0

# ==============================================================================
# CYBERPUNK CUSTOM PALETTE
# ==============================================================================
# Base Background: Deep dark midnight blue-grey
foreground                      #dcdfe4
background                      #1a1a2e
selection_foreground            #1a1a2e
selection_background            #ff71ce

#: The basic 16 colors (Mapped to your specific Cyber-Theme)

# Black / Grey (Neutral #5f5f87)
color0 #5f5f87
color8 #4e4e6a

# Pink / Orange (Primary Cyberpunk)
color1 #ff71ce
color9 #ff71ce
color3 #f5992e
color11 #f5992e

# Glow Lime Green
color2  #05ffa1
color10 #05ffa1

# Faded Blue / Purple
color4  #785cea
color12 #785cea

# Magenta / Cyan (Accents)
color5  #bb9af7
color13 #bb9af7
color6  #7dcfff
color14 #7dcfff

# White
color7  #a9b1d6
color15 #c0caf5

# ==============================================================================
# PERFORMANCE & INTERACTION
# ==============================================================================
scrollback_lines                10000
enable_audio_bell               no

allow_remote_control            yes
listen_on                       unix:/tmp/kitty
clipboard_control               write-clipboard write-primary read-clipboard read-primary
shell_integration               enabled

# ==============================================================================
# KEYBINDINGS
# ==============================================================================
map ctrl+shift+v                paste_from_clipboard
map ctrl+shift+c                copy_to_clipboard
map ctrl+shift+t                new_tab
map ctrl+shift+w                close_tab
map ctrl+shift+left             neighboring_window left
map ctrl+shift+right            neighboring_window right
map ctrl+shift+up               neighboring_window up
map ctrl+shift+down             neighboring_window down
