# ==============================================================================
# WAYLAND / WINDOW SETTINGS
# ==============================================================================
wayland_titlebar_color          background
remember_window_size            no
initial_width                   940
initial_height                  520
window_padding_width            12
placement_strategy              center
hide_window_decorations         yes

# Smooth window behaviors
confirm_os_window_close         0
default_layout                  tall

# Subtle background blur behind the neon text (Requires Wayland compositor support)
dynamic_background_opacity      yes
background_opacity              0.85
background_blur                 20

# ==============================================================================
# FONTS & RENDERING (Aesthetic Tuning)
# ==============================================================================
font_family                     Iosevka Nerd Font
bold_font                       auto
italic_font                     auto
bold_italic_font                auto
font_size                       10

# Anti-aliasing adjustments for cleaner glowing lines
text_composition_strategy       platform
url_style                       curly
url_color                       #89dceb
detect_urls                     yes
# Example for kitty.conf

symbol_map U+4E00-U+9FFF Zen Kaku Gothic New

# ==============================================================================
# CURSOR & MOUSE
# ==============================================================================
cursor                          #f5c2e7
cursor_text_color               #11111b
cursor_shape                    beam
cursor_blink_interval           0.6
cursor_stop_blinking_after      15.0
mouse_hide_wait                 3.0

# ==============================================================================
# HIGH-SATURATION GLOW PALETTE (Cyber Neon Dark Mode)
# ==============================================================================
# Deep, dark velvet-indigo base to absorb and contrast the neon text color glow
#: The basic colors

foreground                      #fce8c3
background                      #121110
selection_foreground            none
selection_background            none


#: Cursor colors

cursor                          #fed06e
cursor_text_color               background


#: The basic 16 colors

#: black
color0 #121110
color8 #917e6b

#: red
color1 #ef2f27
color9 #f75341

#: green
color2  #519f50
color10 #98bc37

#: yellow
color3  #fbb829
color11 #fed06e

#: blue
color4  #2c78bf
color12 #68a8e4

#: magenta
color5  #e02c6d
color13 #ff5c8f

#: cyan
color6  #0aaeb3
color14 #2be4d0

#: white
color7  #c5b088
color15 #fce8c3
# ==============================================================================
# PERFORMANCE & INTERACTION
# ==============================================================================
scrollback_lines                10000
enable_audio_bell               no

# Remote setups (Essential for remote tool integrations & socket lookups)
allow_remote_control            yes
listen_on                       unix:/tmp/kitty
clipboard_control               write-clipboard write-primary read-clipboard read-primary
shell_integration               enabled

# ==============================================================================
# KEYBINDINGS
# ==============================================================================
# Core Clipboard
map ctrl+shift+v                paste_from_clipboard
map ctrl+shift+c                copy_to_clipboard

# Tab Management
map ctrl+shift+t                new_tab
map ctrl+shift+w                close_tab

# Smart Window Splitting navigation (Since default layout is 'tall')
map ctrl+shift+left             neighboring_window left
map ctrl+shift+right            neighboring_window right
map ctrl+shift+up               neighboring_window up
map ctrl+shift+down             neighboring_window down
